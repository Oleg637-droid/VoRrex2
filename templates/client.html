<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет клиента</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 50px; }
        .card { background: white; padding: 40px; border-radius: 12px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; }
        .logout { display: inline-block; margin-top: 20px; color: #e74c3c; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛍️ Кабинет покупателя</h1>
        <p>Добро пожаловать, <strong>{{ name }}</strong>!</p>
        <p>Здесь будут ваши заказы, история покупок и персональные скидки.</p>
        <a href="/logout" class="logout">Выйти из аккаунта</a>
    </div>
</body>
</html>
